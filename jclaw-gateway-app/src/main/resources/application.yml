server:
  port: ${SERVER_PORT:8080}

jclaw:
  identity:
    name: JClaw
    description: Personal AI assistant
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Default Agent
        tools:
          profile: coding
  tools:
    profile: coding
  skills:
    allow-bundled:
      - "*"
  plugins:
    enabled: true
  channels:
    telegram:
      enabled: ${TELEGRAM_ENABLED:false}
      bot-token: ${TELEGRAM_BOT_TOKEN:}
      webhook-url: ${TELEGRAM_WEBHOOK_URL:}
      allowed-users: ${TELEGRAM_ALLOWED_USERS:}
    email:
      enabled: ${EMAIL_ENABLED:false}
      provider: ${EMAIL_PROVIDER:imap}
      imap-host: ${EMAIL_IMAP_HOST:}
      imap-port: ${EMAIL_IMAP_PORT:993}
      smtp-host: ${EMAIL_SMTP_HOST:}
      smtp-port: ${EMAIL_SMTP_PORT:587}
      username: ${EMAIL_USERNAME:}
      password: ${EMAIL_PASSWORD:}
      poll-interval: ${EMAIL_POLL_INTERVAL:60}
    sms:
      enabled: ${SMS_ENABLED:false}
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_FROM_NUMBER:}
      webhook-path: ${SMS_WEBHOOK_PATH:/webhooks/sms}
    slack:
      enabled: ${SLACK_ENABLED:false}
      bot-token: ${SLACK_BOT_TOKEN:}
      signing-secret: ${SLACK_SIGNING_SECRET:}
      app-token: ${SLACK_APP_TOKEN:}
    discord:
      enabled: ${DISCORD_ENABLED:false}
      bot-token: ${DISCORD_BOT_TOKEN:}
      application-id: ${DISCORD_APPLICATION_ID:}
      use-gateway: ${DISCORD_USE_GATEWAY:false}

spring:
  config:
    import: optional:file:${user.home}/.jclaw/application-local.yml
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.platform.AgentPlatformAutoConfiguration
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    openai:
      enabled: ${OPENAI_ENABLED:false}
      api-key: ${OPENAI_API_KEY:not-set}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
    ollama:
      enabled: ${OLLAMA_ENABLED:false}
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

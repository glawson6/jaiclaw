id: e2e-processor-fail
name: E2E Processor Board (fail policy)
initialState: backlog
columns:
  - state: backlog
    name: Backlog
    phase: QUEUED
  - state: drafting
    name: Drafting
    phase: RUNNING
    processor:
      type: agent
      promptTemplate: "Draft: {{name}}"
      onSuccess: SUBMIT
      onFailure: BLOCK
      idempotent: true
      restartPolicy: fail
      maxAttempts: 1
  - state: review
    name: Review
    phase: RUNNING
  - state: blocked
    name: Blocked
    phase: BLOCKED
  - state: done
    name: Done
    phase: SUCCEEDED
    terminal: true
    terminalKind: SUCCESS
transitions:
  - { from: backlog,  to: drafting, event: START }
  - { from: drafting, to: review,   event: SUBMIT }
  - { from: drafting, to: blocked,  event: BLOCK }
  - { from: review,   to: done,     event: APPROVE }
  - { from: blocked,  to: drafting, event: UNBLOCK }

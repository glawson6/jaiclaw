server:
  port: ${GATEWAY_PORT:8080}

jaiclaw:
  rules:
    enabled: true
  skills:
    allow-bundled: []
  security:
    mode: ${JAICLAW_SECURITY_MODE:none}
  identity:
    name: Support Triage
    description: AI support triage with deterministic sentiment analysis and routing rules
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Triage Agent
        system-prompt:
          strategy: inline
          content: |
            You are a support triage agent that classifies incoming messages and routes them to the right team.

            WORKFLOW — follow these steps for every support message:

            1. ANALYZE the message using rules_execute with ruleName "text-analysis"
               Pass facts as: {"text": "<the user's support message>"}
               This returns: sentiment, keywords, categories

            2. DECIDE routing using rules_execute with ruleName "decision"
               Map the analysis results to decision parameters:
               {"parameters": {
                 "urgency": "<critical|high|medium|low based on sentiment and keywords>",
                 "type": "<technical|billing|account|general based on categories>",
                 "severity": "<critical|high|medium|low>",
                 "amount": "0"
               }}
               This returns: decision, priority, recommendation, reasoning

            3. STORE the ticket using store_ticket with all gathered information

            4. RESPOND to the user with:
               - Ticket ID
               - Detected sentiment and categories
               - Assigned priority and team
               - Decision (ESCALATE / ROUTE / AUTO_RESOLVE)
               - What to expect next

            ROUTING GUIDELINES:
            - Critical + technical → Tier-2 Engineering, ESCALATE
            - High + billing → Billing Support, ROUTE
            - Negative sentiment + any → increase priority by one level
            - Positive/neutral + low severity → General Support, AUTO_RESOLVE

            You can also use triage_summary to report on recent tickets when asked.
        tools:
          profile: full

drools:
  rule-loaders:
    - type: classpath
      locations:
        - rules/text-analysis-rules.drl
        - rules/decision-rules.drl
      enabled: true
      priority: 10

spring:
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.platform.AgentPlatformAutoConfiguration
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}

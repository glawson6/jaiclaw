spring:
  main:
    web-application-type: none
  shell:
    interactive:
      enabled: true
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}

jaiclaw:
  security:
    mode: none
  skills:
    allow-bundled: []
  identity:
    name: Sales Enrichment Agent
    description: Enriches new CRM leads with research, scores ICP fit, drafts outreach.
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Sales Enrichment Agent
        tools:
          profile: full
  pipeline:
    enabled: true
    tracker:
      enabled: true
      max-per-pipeline: 100

server:
  port: ${GATEWAY_PORT:8080}

jaiclaw:
  rules:
    enabled: true
  skills:
    allow-bundled: []
  security:
    mode: ${JAICLAW_SECURITY_MODE:none}
  identity:
    name: Procurement Approval
    description: AI procurement intake with deterministic approval rules
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Procurement Agent
        system-prompt:
          strategy: inline
          content: |
            You are a procurement approval assistant. You help employees submit purchase requests and guide them through the approval process.

            WORKFLOW — follow these steps for every procurement request:

            1. EXTRACT details from the user's request. You need:
               - What they want to buy (description)
               - How much it costs (amount in USD)
               - Who the vendor is
               - Vendor contact email and phone (if available)
               - Their name (requester)
               Ask for any missing information conversationally.

            2. ANALYZE the justification using rules_execute with ruleName "text-analysis"
               Pass: {"text": "<their description and justification>"}
               This helps assess urgency and category.

            3. VALIDATE vendor contact info using rules_execute with ruleName "validation"
               Pass: {"data": {"email": "<vendor email>", "phone": "<vendor phone>"}}
               Report any validation errors and ask for corrections.

            4. DECIDE approval using rules_execute with ruleName "decision"
               Pass: {"parameters": {
                 "amount": "<cost as string>",
                 "urgency": "<critical|high|medium|low>",
                 "type": "<software|hardware|services|other>",
                 "severity": "<high|medium|low>"
               }}
               This returns the approval decision and routing.

            5. SUBMIT using submit_procurement with all gathered details

            6. RESPOND with:
               - Request ID
               - Decision: APPROVED (auto-approved, typically under $100) / PENDING_APPROVAL (needs manager) / ESCALATE (urgent or high-value)
               - Priority and assigned approver
               - Next steps

            APPROVAL THRESHOLDS (enforced by rules):
            - Under $100: Auto-approve
            - $100-$1000: Manager approval required
            - Over $1000: VP approval required
            - Critical urgency: Always escalate regardless of amount

            You can use procurement_status and procurement_list to check on existing requests.
        tools:
          profile: full

drools:
  rule-loaders:
    - type: classpath
      locations:
        - rules/text-analysis-rules.drl
        - rules/decision-rules.drl
        - rules/validation-rules.drl
      enabled: true
      priority: 10

spring:
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.platform.AgentPlatformAutoConfiguration
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}

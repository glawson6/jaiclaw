spring:
  application:
    name: security-handshake-demo
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
    openai:
      enabled: ${OPENAI_ENABLED:false}
      api-key: ${OPENAI_API_KEY:not-set}
    ollama:
      enabled: ${OLLAMA_ENABLED:false}
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    minimax:
      enabled: ${MINIMAX_ENABLED:false}
      api-key: ${MINIMAX_API_KEY:not-set}
      base-url: ${MINIMAX_BASE_URL:https://api.minimax.chat}
      chat:
        model: ${MINIMAX_MODEL:M2-her}

jaiclaw:
  skills:
    # Prevents the ~26K-token cost of loading all bundled skills into the
    # system prompt. Whitelist specific skills here if the example needs them.
    allow-bundled: []
  security:
    handshake:
      mode: HTTP_CLIENT
      mcp-server-url: http://localhost:8080/mcp/security
      bootstrap: api-key
      api-key: ${HANDSHAKE_API_KEY:demo-key-12345}
      server:
        enabled: true
        mcp-server-name: security
        token-ttl-seconds: 3600

server:
  port: ${SERVER_PORT:8100}

management:
  endpoints:
    web:
      exposure:
        include: pipelines,health

jaiclaw:
  # Disable auth so the e2e runner can hit the actuator + trigger endpoints
  # without managing API keys. Real deployments should configure this properly.
  security:
    mode: none
  # Mandated by CLAUDE.md: keep the system prompt token budget sane.
  skills:
    allow-bundled: []
  pipeline:
    enabled: true
    http-trigger:
      enabled: true
      base-path: /api/pipelines
      # Alias allow-list (0.9.1+): the only way to expose a pipeline through
      # the public HTTP surface. Callers POST a trigger resource with one of
      # these aliases in the `pipeline` field; the framework maps it to the
      # internal pipeline id. Pipelines not listed here are unreachable via
      # HTTP — that's the safe-by-default posture.
      allowed:
        processor-demo: processor-pipe
        ticket-scoring: embabel-pipe
        # The agent-pipe + embabel-triage-pipe aliases are exposed even when
        # those pipelines aren't registered (JAICLAW_E2E_WITH_AGENT /
        # JAICLAW_E2E_WITH_EMBABEL + ANTHROPIC_API_KEY off). Trigger calls
        # against an unregistered backing pipeline produce HTTP 500
        # ("misconfigured"), which is what the e2e harness's optional
        # scenarios check for as a soft-skip signal.
        weather-agent: agent-pipe
        ticket-triage: embabel-triage-pipe
    tracker:
      enabled: true
      max-per-pipeline: 20
    # Pick up per-file pipelines bundled in the jar (under
    # src/main/resources/jaiclaw/pipelines/), so the e2e example also
    # demonstrates Phase F (per-file YAML loading).
    locations:
      patterns:
        - "classpath*:jaiclaw/pipelines/*.yml"

# AGENT-pipe-only knobs (only used when JAICLAW_E2E_WITH_AGENT=true and an agent is provisioned).
# Also used by the EMBABEL pipelines (JAICLAW_E2E_WITH_EMBABEL=true). The Anthropic
# starter is on the classpath so Embabel's AgentPlatformAutoConfiguration has a
# registered LLM to resolve `embabel.models.default-llm` against. The pure-compute
# Embabel agent (TicketScoringAgent) never invokes the model, so a `not-set` API
# key still lets the app boot. The LLM-backed TicketTriageAgent gets registered
# only when ANTHROPIC_API_KEY is actually set in the environment.
spring:
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    anthropic:
      enabled: true
      api-key: ${ANTHROPIC_API_KEY:not-set}
      base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
    # Embabel's bundled agent-application.properties references
    # spring.ai.openai.api-key — guard the boot with a harmless fallback so we
    # don't need OPENAI_API_KEY in the environment.
    openai:
      api-key: ${OPENAI_API_KEY:not-configured}
      enabled: false

# Embabel: pick the LLM the GOAP planner uses. `default-llm` must match a
# model_id from the Anthropic starter's bundled models/anthropic-models.yml.
# mock-mode is forced off so Embabel actually resolves models (the upstream
# default is mock-mode=true).
embabel:
  models:
    default-llm: ${EMBABEL_DEFAULT_LLM:${ANTHROPIC_MODEL:claude-sonnet-4-5}}
  agent:
    platform:
      test:
        mock-mode: false
      models:
        anthropic:
          api-key: ${ANTHROPIC_API_KEY:not-set}
          base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}

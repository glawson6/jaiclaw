spring:
  main:
    web-application-type: none
  shell:
    interactive:
      enabled: true
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}

jaiclaw:
  security:
    mode: none
  skills:
    allow-bundled: []
  identity:
    name: Contract Reviewer
    description: Six-stage contract review with embedded playbook.
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Contract Reviewer Agent
        tools:
          profile: minimal
  pipeline:
    enabled: true
    tracker:
      enabled: true
      max-per-pipeline: 50

spring:
  main:
    web-application-type: none
  shell:
    interactive:
      enabled: true
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}

jaiclaw:
  security:
    mode: none
  skills:
    allow-bundled: []
  identity:
    name: Competitive Intel Analyst
    description: Daily briefing of competitor moves.
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Competitive Intel Agent
        tools:
          # `full` exposes WebSearchTool so the collect-signals stage can hit
          # DuckDuckGo. The example is also useful with `minimal` — the agent
          # then has to fabricate signals from its prompt context.
          profile: full
  pipeline:
    enabled: true
    tracker:
      enabled: true
      max-per-pipeline: 30

  competitive:
    competitors:
      - Acme
      - Globex
      - Initech

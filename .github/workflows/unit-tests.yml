name: Unit Tests

# Runs the full Spock spec suite across every module on every PR and on
# every push to main. The audit (docs/CODEBASE-ANALYSIS-2026-06-10.md §2.6)
# called out the gap: e2e-tests.yml runs with -DskipTests, so unit-level
# regressions could land silently.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'releases/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'releases/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile reactor
        run: ./mvnw install -DskipTests -B
        env:
          MAVEN_OPTS: '-Xmx2g'

      - name: Run unit tests
        run: ./mvnw test -B -o
        env:
          MAVEN_OPTS: '-Xmx2g'

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          retention-days: 7
          if-no-files-found: ignore

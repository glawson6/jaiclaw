name: Publish to Maven Central

# Triggered on git tag pushes matching v*. Builds the reactor with the
# `release` profile, signs artifacts with GPG, and publishes to the
# Sonatype Central Portal. Also creates a GitHub Release using the matching
# releases/release-X.Y.Z.md as the release body.
#
# Secrets (0.9.2+): all four publishing secrets live in 1Password under
# the TapTech-Security vault, item "Maven-Central", and are loaded via
# 1password/load-secrets-action. The only GitHub-native repo secret is
# OP_SERVICE_ACCOUNT_TOKEN — the bootstrap token for a 1Password Service
# Account scoped read-only to TapTech-Security.
#
# To rotate or pre-seed the 1Password item, run:
#   ./scripts/op-upsert-maven-central.sh
#
# Audit references:
#   docs/CODEBASE-ANALYSIS-2026-06-10.md §1.4, §2.6
#   docs/dev/RELEASE-PLAN-0.9.2.md §2 (GitHub Actions migration)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g., v0.7.1)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # for creating the GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 0.9.2: load Maven Central + GPG secrets from 1Password. The
      # action registers each loaded value with GitHub's log masking so
      # they cannot leak into job output even if a later step echoes
      # them by accident.
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          MAVEN_CENTRAL_USERNAME: op://TapTech-Security/Maven-Central/username
          MAVEN_CENTRAL_PASSWORD: op://TapTech-Security/Maven-Central/password
          GPG_PRIVATE_KEY:        op://TapTech-Security/Maven-Central/gpg-private-key
          GPG_PASSPHRASE:         op://TapTech-Security/Maven-Central/gpg-passphrase

      - name: Import GPG key
        run: |
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          echo "default-cache-ttl 7200" > ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye

      - name: Determine version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify release notes exist
        run: |
          NOTES_FILE="releases/release-${{ steps.ver.outputs.version }}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Missing release notes file: $NOTES_FILE"
            exit 1
          fi
          echo "Found notes: $NOTES_FILE"

      - name: Deploy to Maven Central
        run: ./mvnw -B -Prelease deploy -DskipTests
        env:
          MAVEN_OPTS: '-Xmx2g'
          # Loaded by the "Load secrets from 1Password" step above and
          # exposed to every subsequent step via export-env: true.
          MAVEN_GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: releases/release-${{ steps.ver.outputs.version }}.md
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

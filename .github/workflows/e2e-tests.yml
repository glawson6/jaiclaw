name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      scenarios:
        description: 'Scenarios to run (comma-separated: 1,2,3,4,5 or "all")'
        default: 'all'
        type: string
      ai_provider:
        description: 'AI provider (anthropic, openai, gemini)'
        default: 'anthropic'
        type: string
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'releases/**'
      # Note: jaiclaw-examples/** is intentionally NOT ignored — example
      # rot needs to break the build. (Per docs/CODEBASE-ANALYSIS-2026-06-10.md §2.6.)

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build all modules
        run: ./mvnw install -DskipTests -B
        env:
          MAVEN_OPTS: '-Xmx2g'

      # 0.9.2: load LLM provider keys from 1Password. The Anthropic
      # triple lives in the existing MiniMax-Anthropic-API item (the
      # e2e suite uses MiniMax-via-Anthropic-endpoint by default).
      # OPENAI_API_KEY and GOOGLE_API_KEY are not yet migrated — the
      # e2e harness gracefully no-ops when a provider's key is absent
      # (per CLAUDE.md ${VAR:not-set} pattern), and the default
      # scenario set runs Anthropic-only.
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY:  op://TapTech-Security/MiniMax-Anthropic-API/anthropic-api-key
          ANTHROPIC_BASE_URL: op://TapTech-Security/MiniMax-Anthropic-API/anthropic-base-url
          ANTHROPIC_MODEL:    op://TapTech-Security/MiniMax-Anthropic-API/anthropic-model

      - name: Run E2E tests
        run: |
          chmod +x e2e/run-e2e-tests.sh
          e2e/run-e2e-tests.sh
        env:
          E2E_SCENARIOS: ${{ github.event.inputs.scenarios || '1,3,4,5' }}
          AI_PROVIDER: ${{ github.event.inputs.ai_provider || 'anthropic' }}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: /tmp/jaiclaw-e2e-*/
          retention-days: 7
          if-no-files-found: ignore

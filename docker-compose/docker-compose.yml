services:

  gateway:
    image: io.jclaw/jclaw-gateway-app:${JCLAW_VERSION:-0.1.0-SNAPSHOT}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      # LLM provider selection (anthropic, openai, or ollama)
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-not-set}
      ANTHROPIC_ENABLED: ${ANTHROPIC_ENABLED:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-not-set}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}

      # Security
      JCLAW_SECURITY_MODE: ${JCLAW_SECURITY_MODE:-api-key}
      JCLAW_API_KEY: ${JCLAW_API_KEY:-}

      # Channel adapters (all optional — set *_ENABLED=true to activate)
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      SLACK_ENABLED: ${SLACK_ENABLED:-false}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      DISCORD_ENABLED: ${DISCORD_ENABLED:-false}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
      DISCORD_USE_GATEWAY: ${DISCORD_USE_GATEWAY:-false}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_IMAP_HOST: ${EMAIL_IMAP_HOST:-}
      EMAIL_IMAP_PORT: ${EMAIL_IMAP_PORT:-993}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      SMS_ENABLED: ${SMS_ENABLED:-false}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}

      # Cron Job Manager MCP connection
      JCLAW_CRON_MANAGER_ENABLED: ${CRON_MANAGER_ENABLED:-false}
      JCLAW_CRON_MANAGER_URL: http://cron-manager:8090/mcp/cron-manager
    restart: unless-stopped

  cron-manager:
    image: io.jclaw/jclaw-cron-manager:${JCLAW_VERSION:-0.1.0-SNAPSHOT}
    ports:
      - "${CRON_MANAGER_PORT:-8090}:8090"
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-not-set}
      ANTHROPIC_ENABLED: ${ANTHROPIC_ENABLED:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-not-set}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      JCLAW_SECURITY_MODE: ${JCLAW_SECURITY_MODE:-api-key}
      JCLAW_API_KEY: ${JCLAW_API_KEY:-}
      JCLAW_CRON_MANAGER_PORT: 8090
    volumes:
      - cron-manager-data:/root/.jclaw
    restart: unless-stopped
    profiles:
      - cron-manager

  cli:
    image: io.jclaw/jclaw-shell:${JCLAW_VERSION:-0.1.0-SNAPSHOT}
    stdin_open: true
    tty: true
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-not-set}
      ANTHROPIC_ENABLED: ${ANTHROPIC_ENABLED:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-not-set}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    profiles:
      - cli

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    profiles:
      - ollama

volumes:
  ollama-data:
  cron-manager-data:
